services:
  # Backend API
  - type: web
    name: ecommerce-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: NODE_ENV
        value: production

  # Storefront Frontend (React SPA)
  - type: web
    name: ecommerce-storefront
    runtime: static
    rootDir: storefront-react
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Admin Frontend (React SPA)
  - type: web
    name: ecommerce-admin
    runtime: static
    rootDir: admin-react
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
